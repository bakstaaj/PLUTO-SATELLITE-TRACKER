<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pluto Satellite Tracker</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #18212f;
      --muted: #657286;
      --line: #d8e0ea;
      --accent: #006f9f;
      --good: #1a7f37;
      --warn: #a15c00;
      --selected: #e8f4fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 650;
    }

    main {
      display: grid;
      grid-template-columns: minmax(260px, 360px) 1fr;
      gap: 16px;
      padding: 16px;
    }

    section {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 15px;
    }

    dl {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 8px 12px;
      margin: 0;
      font-size: 14px;
    }

    dt {
      color: var(--muted);
    }

    dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 600;
    }

    .status {
      color: var(--good);
      font-weight: 650;
    }

    .empty {
      color: var(--muted);
      padding: 24px 8px;
      text-align: center;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .freq {
      white-space: nowrap;
    }

    .pass-list {
      display: grid;
      gap: 8px;
    }

    .pass-row {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1.2fr;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      cursor: pointer;
    }

    .pass-row strong {
      display: block;
    }

    .pass-row:focus,
    .pass-row:hover,
    .pass-row.selected {
      background: var(--selected);
      outline: none;
    }

    .radio-ok {
      color: var(--good);
      font-weight: 650;
    }

    .radio-warn {
      color: var(--warn);
      font-weight: 650;
    }

    .detail-title {
      margin-bottom: 4px;
      font-size: 18px;
      font-weight: 650;
    }

    .detail-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 14px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .detail-grid h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    @media (max-width: 760px) {
      main {
        grid-template-columns: 1fr;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Pluto Satellite Tracker</h1>
    <div id="status" class="status">Connecting...</div>
  </header>

  <main>
    <section>
      <h2>Observer</h2>
      <dl id="observer">
        <dt>Name</dt><dd>Loading...</dd>
      </dl>
    </section>

    <section>
      <h2>Next Passes</h2>
      <div id="passes" class="empty">Loading passes...</div>
    </section>

    <section>
      <h2>Selected Pass</h2>
      <div id="passDetail" class="empty">Select a pass to see radio and tracking details.</div>
    </section>

    <section>
      <h2>Storage</h2>
      <dl id="storage">
        <dt>Data</dt><dd>Loading...</dd>
      </dl>
    </section>

    <section>
      <h2>Satellite Catalog</h2>
      <div id="catalogMeta" class="meta">Loading catalog...</div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>NORAD</th>
            <th>Downlinks</th>
            <th>Modes</th>
          </tr>
        </thead>
        <tbody id="satellites">
          <tr><td colspan="4" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    async function getJson(url) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) throw new Error(`${url}: ${response.status}`);
      return response.json();
    }

    function setDl(id, entries) {
      const node = document.getElementById(id);
      node.innerHTML = "";
      for (const [label, value] of entries) {
        const dt = document.createElement("dt");
        const dd = document.createElement("dd");
        dt.textContent = label;
        dd.textContent = value ?? "";
        node.append(dt, dd);
      }
    }

    function formatHz(hz) {
      if (!Number.isFinite(Number(hz))) return "";
      return `${(Number(hz) / 1000000).toFixed(3)} MHz`;
    }

    function summarizeDownlinks(sat) {
      const seen = new Set();
      const rows = [];
      for (const tx of sat.transmitters || []) {
        if (!tx.downlink_hz) continue;
        const label = formatHz(tx.downlink_hz);
        if (seen.has(label)) continue;
        seen.add(label);
        rows.push(label);
      }
      return rows.slice(0, 4);
    }

    function formatTime(iso) {
      if (!iso) return "";
      return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function formatDuration(seconds) {
      const minutes = Math.round(Number(seconds || 0) / 60);
      return `${minutes} min`;
    }

    function formatDateTime(iso) {
      if (!iso) return "";
      return new Date(iso).toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function renderRadioTarget(pass) {
      const radio = pass.radio || {};
      const downlink = radio.downlink_hz || (pass.downlinks_hz || [])[0];
      if (!downlink) return "No downlink";
      const mode = radio.mode || (pass.modes || [])[0] || "";
      const prefix = radio.pluto_tunable === false ? "Out of range" : "Tune";
      return `${prefix} ${formatHz(downlink)} ${mode}`.trim();
    }

    function renderPassDetail(pass) {
      const node = document.getElementById("passDetail");
      if (!pass) {
        node.className = "empty";
        node.textContent = "Select a pass to see radio and tracking details.";
        return;
      }

      const radio = pass.radio || {};
      const uplink = radio.uplink_hz ? formatHz(radio.uplink_hz) : "-";
      const downlink = radio.downlink_hz ? formatHz(radio.downlink_hz) : "-";
      const tunable = radio.pluto_tunable === false ? "No" : "Yes";
      const description = radio.description || "-";

      node.className = "";
      node.innerHTML = `
        <div class="detail-title"></div>
        <div class="detail-subtitle"></div>
        <div class="detail-grid">
          <div>
            <h3>Timing</h3>
            <dl>
              <dt>AOS</dt><dd></dd>
              <dt>TCA</dt><dd></dd>
              <dt>LOS</dt><dd></dd>
              <dt>Duration</dt><dd></dd>
            </dl>
          </div>
          <div>
            <h3>Geometry</h3>
            <dl>
              <dt>Max elevation</dt><dd></dd>
              <dt>AOS azimuth</dt><dd></dd>
              <dt>LOS azimuth</dt><dd></dd>
              <dt>TCA range</dt><dd></dd>
            </dl>
          </div>
          <div class="full-width">
            <h3>Radio Target</h3>
            <dl>
              <dt>Downlink</dt><dd></dd>
              <dt>Uplink</dt><dd></dd>
              <dt>Mode</dt><dd></dd>
              <dt>Type</dt><dd></dd>
              <dt>Status</dt><dd></dd>
              <dt>Pluto tunable</dt><dd></dd>
              <dt>Description</dt><dd></dd>
            </dl>
          </div>
        </div>
      `;

      node.querySelector(".detail-title").textContent = pass.name || "";
      node.querySelector(".detail-subtitle").textContent = `NORAD ${pass.norad_id || ""}`;
      const dds = node.querySelectorAll("dd");
      const values = [
        formatDateTime(pass.aos_utc),
        formatDateTime(pass.tca_utc),
        formatDateTime(pass.los_utc),
        formatDuration(pass.duration_s),
        `${pass.max_elevation_deg} deg`,
        `${pass.aos_azimuth_deg} deg`,
        `${pass.los_azimuth_deg} deg`,
        `${pass.range_at_tca_km} km`,
        downlink,
        uplink,
        radio.mode || "-",
        radio.type || "-",
        radio.status || "-",
        tunable,
        description
      ];
      values.forEach((value, index) => {
        dds[index].textContent = value;
      });
    }

    function renderPasses(payload) {
      const node = document.getElementById("passes");
      const passes = payload.passes || [];
      if (!passes.length) {
        node.className = "empty";
        node.textContent = payload.message || "No upcoming passes in the prediction window.";
        renderPassDetail(null);
        return;
      }

      node.className = "pass-list";
      node.innerHTML = "";
      const visiblePasses = passes.slice(0, 12);
      for (const [index, pass] of visiblePasses.entries()) {
        const row = document.createElement("div");
        row.className = index === 0 ? "pass-row selected" : "pass-row";
        row.tabIndex = 0;
        const downlink = (pass.downlinks_hz || [])[0];
        row.innerHTML = `<div><strong></strong><span></span></div><div></div><div></div>`;
        row.children[0].querySelector("strong").textContent = pass.name || "";
        row.children[0].querySelector("span").textContent =
          downlink ? `${formatHz(downlink)} ${((pass.modes || [])[0] || "")}` : ((pass.modes || [])[0] || "");
        row.children[1].textContent =
          `${formatTime(pass.aos_utc)}-${formatTime(pass.los_utc)} (${formatDuration(pass.duration_s)})`;
        row.children[2].className = pass.radio && pass.radio.pluto_tunable === false ? "radio-warn" : "radio-ok";
        row.children[2].textContent = renderRadioTarget(pass);
        row.title = `Max ${pass.max_elevation_deg} deg, az ${pass.aos_azimuth_deg}-${pass.los_azimuth_deg}`;
        row.addEventListener("click", () => {
          node.querySelectorAll(".pass-row").forEach((item) => item.classList.remove("selected"));
          row.classList.add("selected");
          renderPassDetail(pass);
        });
        row.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            row.click();
          }
        });
        node.appendChild(row);
      }
      renderPassDetail(visiblePasses[0]);
    }

    async function refresh() {
      const [status, config, catalog, passes] = await Promise.all([
        getJson("/api/status"),
        getJson("/api/config"),
        getJson("/api/satellites"),
        getJson("/api/passes")
      ]);

      document.getElementById("status").textContent = status.ok ? "Backend online" : "Backend warning";

      setDl("observer", [
        ["Name", config.name],
        ["Latitude", `${config.latitude_deg} deg`],
        ["Longitude", `${config.longitude_deg} deg`],
        ["Altitude", `${config.altitude_m} m`],
        ["Minimum elevation", `${config.minimum_elevation_deg} deg`]
      ]);

      setDl("storage", [
        ["Web", status.web_dir],
        ["Config", status.config_dir],
        ["Data", status.data_dir]
      ]);

      renderPasses(passes);

      const tbody = document.getElementById("satellites");
      const satellites = catalog.satellites || [];
      const meta = catalog.metadata || {};
      document.getElementById("catalogMeta").textContent =
        `${meta.satellite_count ?? satellites.length} satellites, ` +
        `${meta.satellites_with_transmitters ?? 0} with transmitter metadata` +
        (catalog.updated_utc ? `, updated ${catalog.updated_utc}` : "");

      if (!satellites.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">Catalog is ready for TLE and repeater metadata import.</td></tr>';
        return;
      }

      tbody.innerHTML = "";
      for (const sat of satellites) {
        const tr = document.createElement("tr");
        const downlinks = summarizeDownlinks(sat);
        tr.innerHTML = `<td></td><td></td><td class="freq"></td><td></td>`;
        tr.children[0].textContent = sat.name || "";
        tr.children[1].textContent = sat.norad_id || "";
        tr.children[2].textContent = downlinks.length ? downlinks.join(", ") : "-";
        tr.children[3].textContent = (sat.modes || []).join(", ") || "-";
        tbody.appendChild(tr);
      }
    }

    refresh().catch((error) => {
      document.getElementById("status").textContent = "Backend unavailable";
      document.getElementById("passes").textContent = error.message;
    });
  </script>
</body>
</html>
